# Upstream para health checks e APIs externas
upstream backend {
    server api-backend:3000;
    keepalive 32;
}

upstream supabase {
    server ${SUPABASE_URL};
    keepalive 32;
}

# Rate limiting para diferentes endpoints
limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=static:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=upload:10m rate=2r/s;

server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # Cache control para diferentes tipos de conteúdo
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header Vary "Accept-Encoding";
        limit_req zone=static burst=50 nodelay;
        
        # Try files primeiro
        try_files $uri =404;
    }

    # Service Worker
    location = /sw.js {
        expires 0;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
        try_files $uri =404;
    }

    # Manifest e arquivos PWA
    location ~* \.(manifest|webmanifest)$ {
        expires 1d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    # HTML files
    location ~* \.html$ {
        expires 1h;
        add_header Cache-Control "public, no-cache";
        try_files $uri =404;
    }

    # API routes (proxy para backend)
    location /api/ {
        limit_req zone=api burst=20 nodelay;
        
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        
        # Timeout settings
        proxy_connect_timeout 30s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }

    # Supabase routes
    location /rest/v1/ {
        proxy_pass https://${SUPABASE_URL}/rest/v1/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header apikey $http_apikey;
    }

    location /auth/v1/ {
        proxy_pass https://${SUPABASE_URL}/auth/v1/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header apikey $http_apikey;
    }

    location /storage/v1/ {
        proxy_pass https://${SUPABASE_URL}/storage/v1/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header apikey $http_apikey;
    }

    # Upload endpoints
    location ~* ^/api/(upload|import|sync) {
        limit_req zone=upload burst=5 nodelay;
        client_max_body_size 100M;
        
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Timeout para uploads
        proxy_connect_timeout 60s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }

    # Health check endpoint
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # Ready check endpoint
    location /ready {
        access_log off;
        
        # Verificar se backend está disponível
        proxy_pass http://backend/health;
        proxy_connect_timeout 5s;
        proxy_send_timeout 5s;
        proxy_read_timeout 5s;
        
        error_page 502 503 504 = @ready_fallback;
    }

    location @ready_fallback {
        return 200 "ready\n";
        add_header Content-Type text/plain;
    }

    # Live readiness check
    location /live {
        access_log off;
        
        # Verificar conexão com Supabase
        proxy_pass https://${SUPABASE_URL}/rest/v1/;
        proxy_connect_timeout 5s;
        proxy_send_timeout 5s;
        proxy_read_timeout 5s;
        
        error_page 502 503 504 = @live_fallback;
    }

    location @live_fallback {
        return 503 "unhealthy\n";
        add_header Content-Type text/plain;
    }

    # Metrics endpoint (para monitoramento)
    location /metrics {
        allow 127.0.0.1;
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        deny all;
        
        stub_status on;
        access_log off;
    }

    # SPA fallback - todas as outras rotas
    location / {
        limit_req zone=static burst=100 nodelay;
        
        try_files $uri $uri/ /index.html;
        
        # Cache control para HTML
        expires 1h;
        add_header Cache-Control "public, no-cache";
    }

    # Error pages
    error_page 404 /index.html;
    error_page 500 502 503 504 /50x.html;
    
    location = /50x.html {
        root /usr/share/nginx/html;
        internal;
    }

    # Security - bloquear arquivos sensíveis
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
    
    location ~ ~$ {
        deny all;
        access_log off;
        log_not_found off;
    }
}

# Configuração específica para staging
server {
    listen 8080;
    server_name staging.cinecasa.com.br;
    root /usr/share/nginx/html;
    index index.html;

    # Headers específicos de staging
    add_header X-Environment "staging" always;
    add_header X-Debug "true" always;

    # Mesmas configurações do servidor principal...
    include /etc/nginx/conf.d/common/*.conf;
}
