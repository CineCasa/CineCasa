apiVersion: apps/v1
kind: Deployment
metadata:
  name: cinecasa-blue
  namespace: production
  labels:
    app: cinecasa
    env: blue
    version: v1
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: cinecasa
      env: blue
  template:
    metadata:
      labels:
        app: cinecasa
        env: blue
        version: v1
    spec:
      containers:
      - name: cinecasa
        image: cinecasa/app:latest
        ports:
        - containerPort: 8080
          name: http
        env:
        - name: NODE_ENV
          value: "production"
        - name: ENVIRONMENT_COLOR
          value: "blue"
        - name: VITE_API_URL
          valueFrom:
            secretKeyRef:
              name: cinecasa-secrets
              key: API_URL
        - name: VITE_SUPABASE_URL
          valueFrom:
            secretKeyRef:
              name: cinecasa-secrets
              key: SUPABASE_URL
        - name: VITE_SUPABASE_ANON_KEY
          valueFrom:
            secretKeyRef:
              name: cinecasa-secrets
              key: SUPABASE_ANON_KEY
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /ready
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        lifecycle:
          preStop:
            exec:
              command: ["/bin/sh", "-c", "sleep 15"]
      imagePullSecrets:
      - name: registry-secret
---
apiVersion: v1
kind: Service
metadata:
  name: cinecasa-blue-service
  namespace: production
  labels:
    app: cinecasa
    env: blue
spec:
  selector:
    app: cinecasa
    env: blue
  ports:
  - name: http
    port: 80
    targetPort: 8080
    protocol: TCP
  type: ClusterIP
---
