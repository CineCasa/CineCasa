  <!-- Cache Busting e Service Worker cleanup -->
  <script>
    // Versão atual da página - alterar para forçar reload
    const PAGE_VERSION = 'v4-2026-04-23-fix';
    const STORED_VERSION = localStorage.getItem('watch-page-version');
    
    // Se versão mudou, limpa cache e recarrega
    if (STORED_VERSION !== PAGE_VERSION) {
      console.log('[Watch] Nova versão detectada:', PAGE_VERSION, 'limpo cache antigo:', STORED_VERSION);
      localStorage.setItem('watch-page-version', PAGE_VERSION);
      
      // Limpa todo cache da aplicação
      if ('caches' in window) {
        caches.keys().then(names => {
          names.forEach(name => caches.delete(name));
        });
      }
      
      // Força recarregamento sem cache
      if (!location.search.includes('v=' + PAGE_VERSION)) {
        window.location.href = location.pathname + '?v=' + PAGE_VERSION;
      }
    }
    
    console.log('[Watch] Versão', PAGE_VERSION, '- Cache control ativo');
    
    // Limpa cache antigo do Service Worker para watch-party.js
    if ('caches' in window) {
      caches.keys().then(function(cacheNames) {
        cacheNames.forEach(function(cacheName) {
          caches.open(cacheName).then(function(cache) {
            cache.keys().then(function(requests) {
              requests.forEach(function(request) {
                if (request.url.includes('watch-party.js') || request.url.includes('criar-sala.js')) {
                  cache.delete(request);
                  console.log('[Watch] Cache limpo:', request.url);
                }
              });
            });
          });
        });
      });
    }
  </script>
  
  <!-- Scripts do Watch Party - com timestamp para evitar cache -->
  <script>
    (function() {
      var scriptTimestamp = PAGE_VERSION + '-' + Date.now();
      
      function loadScript(src) {
        return new Promise(function(resolve, reject) {
          var script = document.createElement('script');
          script.src = src;
          script.onload = resolve;
          script.onerror = reject;
          document.head.appendChild(script);
        });
      }
      
      loadScript('/js/criar-sala.js?t=' + scriptTimestamp)
        .then(function() {
          console.log('[Watch] criar-sala.js carregado');
          return loadScript('/js/watch-party.js?t=' + scriptTimestamp);
        })
        .then(function() {
          console.log('[Watch] watch-party.js carregado');
        })
        .catch(function(err) {
          console.error('[Watch] Erro ao carregar scripts:', err);
        });
    })();
  </script>

    /* ============================================

    @media (max-width: 1024px) {
      .watch-container {
        flex-direction: column;
        padding-top: 60px;
        padding-bottom: 0;
        min-height: auto;
        height: auto;
      }
      
      .player-area {
        min-height: auto;
        height: auto;
        padding: 8px;
        flex: none;
      }
      
      .video-wrapper {
        max-height: 50vh;
        border-radius: 8px;
      }
      
      .chat-panel {
        position: relative;
        width: 100%;
        height: auto;
        min-height: 300px;
        top: 0;
        border-left: none;
        border-top: 1px solid var(--glass-border);
      }
      
      .chat-messages {
        max-height: 250px;
      }
    }
    
    @media (max-width: 640px) {
      .watch-header {
        padding: 12px 16px;
      }
      
      .watch-logo {
        font-size: 18px;
      }
      
      .watch-status {
        gap: 8px;
        font-size: 12px;
      }
      
      .status-indicator, .user-count {
        padding: 4px 8px;
      }
      
      .player-area {
        padding: 4px;
        min-height: auto;
        height: auto;
      }
      
      .video-wrapper {
        border-radius: 4px;
        max-height: 40vh;
      }
      
      .chat-panel {
        min-height: 280px;
      }
      
      .chat-header {
        padding: 14px 16px;
      }
      
      .chat-messages {
        max-height: 200px;
        padding: 12px;
      }
      
      .invite-section {
        padding: 12px;
      }
      
      .chat-input-form {
        padding: 12px;
      }
    }
    
    /* =========================================
       UTILITÁRIOS
       ========================================= */
    .hidden { display: none !important; }
    .text-success { color: #22c55e; }
    .text-error { color: #ef4444; }
  </style>
</head>
<body>
  
  <!-- ============================================
       HEADER
       ============================================ -->
  <header class="watch-header">
    <div class="header-left">
      <a href="/" class="watch-logo">🎬 CineCasa</a>
      <button class="btn-sair-header" onclick="fecharSala()" title="Sair da sala">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
          <path d="M10.09 15.59L11.5 17l5-5-5-5-1.41 1.41L12.67 11H3v2h9.67l-2.58 2.59zM19 3H5c-1.11 0-2 .9-2 2v4h2V5h14v14H5v-4H3v4c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2z"/>
        </svg>
        <span>Sair</span>
      </button>
    </div>
    
    <div class="watch-status">
      <div class="status-indicator" id="connection-status">
        <span class="status-dot"></span>
        <span id="watch-party-status">Conectando...</span>
      </div>
      
      <div class="user-count">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
          <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
        </svg>
        <span id="user-count">1</span>
      </div>
      
      <button class="btn-close" id="btn-close" onclick="fecharSala()" title="Sair da sala">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
          <path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/>
        </svg>
      </button>
    </div>
  </header>
  
  <!-- ============================================
       ÁREA PRINCIPAL
       ============================================ -->
  <main class="watch-container">
    
    <!-- Área do Player -->
    <div class="player-area">
      <!-- Wrapper do Vídeo -->
      <div class="video-wrapper">
        <video id="watch-party-video" controls preload="metadata">
          <p>Seu navegador não suporta vídeo HTML5.</p>
        </video>
      </div>
    </div>
    
  </main>
  
  <!-- ============================================
       OVERLAYS DE ESTADO
       ============================================ -->
  
  <!-- Loading -->
  <div class="message-overlay" id="loading-overlay">
    <div class="spinner"></div>
    <h2 class="message-title">Conectando...</h2>
    <p class="message-text">Entrando na sala</p>
  </div>
  
  <!-- Sem Room ID -->
  <div class="message-overlay hidden" id="no-room-overlay">
    <div class="message-icon">
      <svg viewBox="0 0 24 24" fill="currentColor">
        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/>
      </svg>
    </div>
    <h2 class="message-title">Sala não encontrada</h2>
    <p class="message-text">Crie uma nova sala para começar</p>
    <button class="btn-primary" onclick="criarNovaSala()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/>
      </svg>
      Nova Sala
    </button>
  </div>
  
  <!-- Erro -->
  <div class="message-overlay hidden" id="error-overlay">
    <div class="message-icon">
      <svg viewBox="0 0 24 24" fill="currentColor">
        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/>
      </svg>
    </div>
    <h2 class="message-title">Erro de Conexão</h2>
    <p class="message-text" id="error-message">Tente novamente</p>
    <button class="btn-primary" onclick="location.reload()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
        <path d="M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/>
      </svg>
      Recarregar
    </button>
  </div>
  
  <!-- Toast Notification -->
  <div class="toast" id="toast"></div>
  
  <!-- ============================================
       CHAT PANEL - BATE-PAPO PREMIUM
       ============================================ -->
  <div class="chat-panel" id="chat-panel">
    <div class="chat-header">
      <div class="chat-title">
        <svg viewBox="0 0 24 24" fill="currentColor">
          <path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H6l-2 2V4h16v12z"/>
        </svg>
        <span>Sala - CineCasa</span>
      </div>
      <div class="chat-status" id="chat-status">
        <span class="status-dot offline"></span>
        <span class="status-text">Offline</span>
      </div>
    </div>
    
    <div class="chat-messages" id="chat-messages">
      <div class="chat-welcome">
        <svg viewBox="0 0 24 24" fill="currentColor">
          <path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H6l-2 2V4h16v12z"/>
        </svg>
        <p>Sem mensagens ainda</p>
      </div>
    </div>
    
    <!-- Campo de Convite Minimalista -->
    <div class="invite-section">
      <div class="invite-label">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor">
          <path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/>
        </svg>
        Link da Sala
      </div>
      <div class="invite-row">
        <div class="invite-link" id="invite-link">Gerando...</div>
        <button class="btn-copy" id="btn-copy" onclick="copiarLinkCompacto()" title="Copiar link">
          <svg viewBox="0 0 24 24" fill="currentColor">
            <path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/>
          </svg>
        </button>
      </div>
    </div>
    
    <form class="chat-input-form" id="chat-form" onsubmit="sendChatMessage(event)">
      <input 
        type="text" 
        class="chat-input" 
        id="chat-input" 
        placeholder="Mensagem..." 
        maxlength="500"
        autocomplete="off"
      />
      <button type="submit" class="chat-send-btn">
        <svg viewBox="0 0 24 24" fill="currentColor">
          <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
        </svg>
      </button>
    </form>
  </div>

  <!-- ============================================
       SCRIPTS DA PÁGINA
       ============================================ -->
  <script>
    // ============================================
    // VARIÁVEIS GLOBAIS
    // ============================================
    let roomId = null;
    let videoUrl = null;
    
    // ============================================
    // INICIALIZAÇÃO
    // ============================================
    document.addEventListener('DOMContentLoaded', () => {
      console.log('[Watch] Página carregada');
      
      // Obtém parâmetros da URL
      const urlParams = new URLSearchParams(window.location.search);
      roomId = urlParams.get('room');
      videoUrl = urlParams.get('video');
      
      // Se não tiver roomId, mostra tela de erro
      if (!roomId) {
        document.getElementById('loading-overlay').classList.add('hidden');
        document.getElementById('no-room-overlay').classList.remove('hidden');
        return;
      }
      
      // Gera link de compartilhamento
      updateInviteLink();
      
      // Configura o player de vídeo
      setupVideoPlayer();
      
      // O cliente WatchParty se conecta automaticamente via watch-party.js
      // Aguarda conexão bem-sucedida
      setupWatchPartyCallbacks();
      
      // Inicializar chat
      initChat();
    });
    
    // ============================================
    // CONFIGURAÇÃO DO PLAYER
    // ============================================
    function setupVideoPlayer() {
      const video = document.getElementById('watch-party-video');
      
      if (!videoUrl) {
        console.log('[Watch] Sem URL de vídeo - modo apenas chat');
        document.getElementById('loading-overlay').classList.add('hidden');
        return;
      }
      
      try {
        const decodedUrl = decodeURIComponent(videoUrl);
        video.src = decodedUrl;
        console.log('[Watch] URL do vídeo:', decodedUrl);
      } catch (e) {
        console.error('[Watch] Erro ao decodificar URL:', e);
        showError('URL do vídeo inválida.');
        return;
      }
      
      // Eventos do player para UI
      video.addEventListener('loadedmetadata', () => {
        console.log('[Watch] Vídeo carregado');
        document.getElementById('loading-overlay').classList.add('hidden');
      });
      
      video.addEventListener('error', (e) => {
        const error = video.error;
        let errorMsg = 'Erro ao carregar o vídeo.';
        
        if (error) {
          switch (error.code) {
            case 1:
              errorMsg = 'Vídeo interrompido. Tente recarregar.';
              break;
            case 2:
              errorMsg = 'Erro de rede. Verifique sua conexão.';
              break;
            case 3:
              errorMsg = 'Formato de vídeo não suportado.';
              break;
            case 4:
              errorMsg = 'Vídeo não encontrado ou acesso negado (CORS).';
              break;
          }
          console.error('[Watch] Erro do vídeo:', error.code, error.message);
        }
        
        showError(errorMsg + ' Verifique a URL ou tente outro vídeo.');
      });
    }
    
    // ============================================
    // CALLBACKS DO WATCH PARTY
    // ============================================
    function setupWatchPartyCallbacks() {
      // Aguarda o objeto watchParty estar disponível
      const checkInterval = setInterval(() => {
        if (window.watchParty) {
          clearInterval(checkInterval);
          console.log('[Watch] WatchParty client pronto');
          
          // Esconde loading quando conectado (modo solo ou Supabase)
          document.getElementById('loading-overlay').classList.add('hidden');
          
          // Callback quando entrar na sala
          window.watchParty.onUserJoined = (data) => {
            console.log('[Watch] Usuário entrou:', data);
            updateUserCount(data.userCount || 1);
            showToast(`Novo participante entrou! (${data.userCount} total)`);
          };
          
          // Callback quando sair
          window.watchParty.onUserLeft = (data) => {
            console.log('[Watch] Usuário saiu:', data);
            updateUserCount(data.userCount || 1);
          };
          
          // Callback de sincronização
          window.watchParty.onSyncUpdate = (data) => {
            console.log('[Watch] Sincronização:', data);
          };
        }
      }, 100);
      
      // Timeout de segurança - esconde loading após 3 segundos mesmo se não conectar
      setTimeout(() => {
        clearInterval(checkInterval);
        document.getElementById('loading-overlay').classList.add('hidden');
        console.log('[Watch] Timeout - escondendo loading');
      }, 3000);
    }
    
    // ============================================
    // FUNÇÕES DE UI
    // ============================================
    function updateUserCount(count) {
      document.getElementById('user-count').textContent = count;
    }
    
    function updateInviteLink() {
      const link = window.location.href;
      const inviteEl = document.getElementById('invite-link');
      if (inviteEl) {
        // Mostra versão curta do link
        const shortLink = link.length > 35 ? link.substring(0, 32) + '...' : link;
        inviteEl.textContent = shortLink;
        inviteEl.title = link; // Tooltip com link completo
      }
    }
    
    async function copiarLinkCompacto() {
      const link = window.location.href;
      const btn = document.getElementById('btn-copy');
      
      try {
        await navigator.clipboard.writeText(link);
        
        // Feedback visual no botão
        btn.classList.add('copied');
        const originalIcon = btn.innerHTML;
        btn.innerHTML = '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>';
        
        showToast('Link copiado!');
        
        // Restaura após 2 segundos
        setTimeout(() => {
          btn.classList.remove('copied');
          btn.innerHTML = originalIcon;
        }, 2000);
      } catch (err) {
        showToast('Erro ao copiar');
      }
    }
    
    // Compatibilidade com funções antigas
    function copiarLink() { copiarLinkCompacto(); }
    function updateShareLink() { updateInviteLink(); }
    
    async function criarNovaSala() {
      showToast('Criando nova sala...');
      
      try {
        const currentVideo = document.getElementById('watch-party-video').src;
        const sala = await criarSala({
          videoUrl: currentVideo || videoUrl || '',
          redirect: true
        });
        
        if (!sala.success) {
          showToast('Erro ao criar sala');
        }
      } catch (error) {
        console.error('[Watch] Erro ao criar sala:', error);
        showToast('Erro ao criar sala');
      }
    }
    
    // ============================================
    // CHAT FUNCTIONS - BATE-PAPO
    // ============================================
    let chatSubscription = null;
    let currentUser = null;
    
    // Inicializar chat
    async function initChat() {
      if (!roomId) return;
      
      // Buscar usuário atual ou criar anon
      const { data: { user } } = await supabase.auth.getUser();
      if (user) {
        currentUser = user;
      } else {
        // Usuário anônimo - gera ID único
        const anonId = sessionStorage.getItem('watchparty_anon_id') || 'anon_' + Math.random().toString(36).substring(2, 15);
        sessionStorage.setItem('watchparty_anon_id', anonId);
        currentUser = {
          id: anonId,
          email: null,
          isAnonymous: true
        };
      }
      console.log('[Chat] Usuário:', currentUser.id, currentUser.isAnonymous ? '(anônimo)' : '(logado)');
      
      // Carregar mensagens existentes
      await loadChatMessages();
      
      // Função para criar subscription com retry
      const createChatSubscription = () => {
        // Remover subscription anterior se existir
        if (chatSubscription) {
          chatSubscription.unsubscribe();
        }
        
        chatSubscription = supabase
          .channel(`chat:${roomId}:${Date.now()}`, {
            config: {
              broadcast: { self: true },
              presence: { key: currentUser.id }
            }
          })
          .on('postgres_changes', {
            event: 'INSERT',
            schema: 'public',
            table: 'watch_party_messages',
            filter: `room_id=eq.${roomId}`
          }, payload => {
            console.log('[Chat] Nova mensagem recebida:', payload.new);
            displayChatMessage(payload.new);
          })
          .on('presence', { event: 'sync' }, () => {
            console.log('[Chat] Presence sync');
          })
          .subscribe((status, err) => {
            console.log('[Chat] Status:', status, err || '');
            const statusEl = document.getElementById('chat-status');
            if (!statusEl) return;
            
            const dotEl = statusEl.querySelector('.status-dot');
            const textEl = statusEl.querySelector('.status-text');
            
            if (status === 'SUBSCRIBED') {
              dotEl.classList.remove('offline');
              textEl.textContent = 'Online';
              console.log('[Chat] Conectado com sucesso!');
            } else if (status === 'CHANNEL_ERROR' || status === 'TIMED_OUT') {
              dotEl.classList.add('offline');
              textEl.textContent = 'Offline';
              console.log('[Chat] Erro na conexão, tentando reconectar em 3s...');
              // Retry automático após 3 segundos
              setTimeout(createChatSubscription, 3000);
            } else {
              dotEl.classList.add('offline');
              textEl.textContent = 'Conectando...';
            }
          });
      };
      
      // Iniciar subscription
      createChatSubscription();
      
      // Verificar status periodicamente
      setInterval(() => {
        if (!chatSubscription) {
          console.log('[Chat] Reconectando...');
          createChatSubscription();
        }
      }, 10000);
    }
    
    // Carregar mensagens do chat
    async function loadChatMessages() {
      try {
        const { data: messages, error } = await supabase
          .from('watch_party_messages')
          .select('*')
          .eq('room_id', roomId)
          .order('created_at', { ascending: true })
          .limit(100);
        
        if (error) {
          console.error('[Chat] Erro ao carregar:', error);
          return;
        }
        
        const container = document.getElementById('chat-messages');
        container.innerHTML = '';
        
        if (messages && messages.length > 0) {
          messages.forEach(msg => displayChatMessage(msg));
        } else {
          container.innerHTML = `
            <div class="chat-welcome">
              <svg width="48" height="48" viewBox="0 0 24 24" fill="rgba(255,255,255,0.3)">
                <path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H6l-2 2V4h16v12z"/>
              </svg>
              <p>Nenhuma mensagem ainda.<br>Seja o primeiro a conversar!</p>
            </div>
          `;
        }
      } catch (err) {
        console.error('[Chat] Erro:', err);
      }
    }
    
    // Enviar mensagem
    async function sendChatMessage(e) {
      e.preventDefault();
      
      const input = document.getElementById('chat-input');
      const message = input.value.trim();
      
      if (!message) return;
      if (!currentUser) {
        showToast('Erro: usuário não identificado');
        return;
      }
      
      try {
        const username = currentUser.email 
          ? currentUser.email.split('@')[0] 
          : (currentUser.isAnonymous ? 'Convidado' : 'Anônimo');
          
        const { error } = await supabase
          .from('watch_party_messages')
          .insert({
            room_id: roomId,
            user_id: currentUser.id,
            username: username,
            message: message
          });
        
        if (error) {
          console.error('[Chat] Erro ao enviar:', error);
          showToast('Erro ao enviar mensagem');
          return;
        }
        
        input.value = '';
      } catch (err) {
        console.error('[Chat] Erro:', err);
        showToast('Erro ao enviar mensagem');
      }
    }
    
    // Exibir mensagem no chat
    function displayChatMessage(msg) {
      const container = document.getElementById('chat-messages');
      const isOwn = currentUser && msg.user_id === currentUser.id;
      const time = new Date(msg.created_at).toLocaleTimeString('pt-BR', { 
        hour: '2-digit', 
        minute: '2-digit' 
      });
      
      // Remover welcome message se existir
      const welcome = container.querySelector('.chat-welcome');
      if (welcome) welcome.remove();
      
      const msgEl = document.createElement('div');
      msgEl.className = `chat-message ${isOwn ? 'own' : ''}`;
      msgEl.innerHTML = `
        <div class="chat-message-header">
          <span class="chat-message-author">${msg.username}</span>
          <span class="chat-message-time">${time}</span>
        </div>
        <div class="chat-message-content">${escapeHtml(msg.message)}</div>
      `;
      
      container.appendChild(msgEl);
      container.scrollTop = container.scrollHeight;
    }
    
    // Escape HTML para segurança
    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }
    
    function showToast(message) {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.classList.add('show');
      
      setTimeout(() => {
        toast.classList.remove('show');
      }, 3000);
    }
    
    function showError(message) {
      document.getElementById('error-message').textContent = message;
      document.getElementById('loading-overlay').classList.add('hidden');
      document.getElementById('no-room-overlay').classList.add('hidden');
      document.getElementById('error-overlay').classList.remove('hidden');
    }
    
    // Fechar sala e voltar ao sistema
    function fecharSala() {
      // Limpar recursos
      if (chatSubscription) {
        supabase.removeChannel(chatSubscription);
        chatSubscription = null;
      }
      
      // Desconectar do watch party
      if (window.watchParty) {
        window.watchParty.disconnect();
      }
      
      // Limpar session storage da sala
      sessionStorage.removeItem('watchparty_current_room');
      
      // Redirecionar para home
      window.location.href = '/';
    }
    
    // ============================================
    // LIMPAR AO SAIR DA PÁGINA
    // ============================================
    window.addEventListener('beforeunload', () => {
      if (chatSubscription) {
        supabase.removeChannel(chatSubscription);
      }
    });
    
    // ============================================
    // ATALHOS DE TECLADO
    // ============================================
    document.addEventListener('keydown', (e) => {
      const video = document.getElementById('watch-party-video');
      
      switch(e.code) {
        case 'Space':
          e.preventDefault();
          if (video.paused) video.play();
          else video.pause();
          break;
          
        case 'ArrowLeft':
          e.preventDefault();
          video.currentTime = Math.max(0, video.currentTime - 10);
          break;
          
        case 'ArrowRight':
          e.preventDefault();
          video.currentTime = Math.min(video.duration, video.currentTime + 10);
          break;
          
        case 'KeyF':
          e.preventDefault();
          if (document.fullscreenElement) {
            document.exitFullscreen();
          } else {
            video.requestFullscreen();
          }
          break;
      }
    });
  </script>
  
</body>
</html>
