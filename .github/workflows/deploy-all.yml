name: Deploy para Vercel + Cloudflare

on:
  push:
    branches: [main, master]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.github/ISSUE_TEMPLATE/**'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ========================================
  # BUILD E TESTES
  # ========================================
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
          VITE_TMDB_API_KEY: ${{ secrets.VITE_TMDB_API_KEY }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-files
          path: dist/
          retention-days: 1

  # ========================================
  # DEPLOY VERCEL (PARALELO)
  # ========================================
  deploy-vercel:
    runs-on: ubuntu-latest
    needs: build
    environment: production
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-files
          path: dist/

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        id: vercel-deploy
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: '--prod --yes'
          working-directory: ./

      - name: Notificar Vercel
        if: success()
        run: |
          echo "✅ Deploy Vercel: ${{ steps.vercel-deploy.outputs.preview-url }}"

  # ========================================
  # DEPLOY CLOUDFLARE (PARALELO)
  # ========================================
  deploy-cloudflare:
    runs-on: ubuntu-latest
    needs: build
    environment: production
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-files
          path: dist/

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        id: cloudflare-deploy
        with:
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: cinecasa
          directory: ./dist
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}

      - name: Notificar Cloudflare
        if: success()
        run: |
          echo "✅ Deploy Cloudflare concluído"

  # ========================================
  # NOTIFICAÇÃO FINAL
  # ========================================
  notify:
    runs-on: ubuntu-latest
    needs: [deploy-vercel, deploy-cloudflare]
    if: always()
    steps:
      - name: Resumo do Deploy
        run: |
          echo "====================================="
          echo "🚀 DEPLOY MULTI-PLATAFORMA CONCLUÍDO"
          echo "====================================="
          echo "✅ Vercel: ${{ needs.deploy-vercel.result }}"
          echo "✅ Cloudflare: ${{ needs.deploy-cloudflare.result }}"
          echo "====================================="
