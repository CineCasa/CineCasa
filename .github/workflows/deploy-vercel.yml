name: Deploy Automático para Vercel

on:
  push:
    branches: [main, master]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.github/ISSUE_TEMPLATE/**'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verificar-secrets:
    runs-on: ubuntu-latest
    outputs:
      vercel_configured: ${{ steps.check.outputs.vercel_configured }}
    steps:
      - name: Verificar Secrets Configurados
        id: check
        run: |
          echo "Verificando secrets necessários..."
          if [ -z "${{ secrets.VERCEL_TOKEN }}" ] || [ -z "${{ secrets.VERCEL_ORG_ID }}" ] || [ -z "${{ secrets.VERCEL_PROJECT_ID }}" ]; then
            echo "⚠️ Secrets da Vercel não configurados - pulando deploy"
            echo "vercel_configured=false" >> $GITHUB_OUTPUT
          else
            echo "✅ Todos os secrets da Vercel estão configurados"
            echo "vercel_configured=true" >> $GITHUB_OUTPUT
          fi

  test-build:
    runs-on: ubuntu-latest
    needs: verificar-secrets
    if: needs.verificar-secrets.outputs.vercel_configured == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Type check
        run: npm run type-check || true

      - name: Build application
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
          VITE_TMDB_API_KEY: ${{ secrets.VITE_TMDB_API_KEY }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

  deploy:
    runs-on: ubuntu-latest
    needs: [verificar-secrets, test-build]
    if: needs.verificar-secrets.outputs.vercel_configured == 'true'
    environment: production
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Vercel (Production)
        uses: amondnet/vercel-action@v25
        id: vercel-deploy
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: '--prod --yes'
          working-directory: ./

      - name: Verificar Deploy
        run: |
          echo "Verificando deploy na URL: ${{ steps.vercel-deploy.outputs.preview-url }}"
          sleep 10
          curl -I -f "${{ steps.vercel-deploy.outputs.preview-url }}" || exit 1

      - name: Notificar Sucesso
        if: success()
        run: |
          echo "✅ Deploy automático concluído com sucesso!"
          echo "URL: ${{ steps.vercel-deploy.outputs.preview-url }}"

      - name: Comentar no PR (se houver)
        if: github.event_name == 'pull_request' && success()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '🚀 **Deploy Automático Concluído!**\n\n✅ Aplicação deployada com sucesso na Vercel.\n\n🔗 URL: ${{ steps.vercel-deploy.outputs.preview-url }}'
            })
