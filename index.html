<!doctype html>

  <head>
    <meta charset="UTF-8" />
    <script type="text/javascript">
      // Restaurar rota do SPA após redirecionamento do 404.html
      (function(l) {
        if (l.search[1] === '/' ) {
          var decoded = l.search.slice(1).split('&').map(function(s) { 
            return s.replace(/~and~/g, '&') 
          }).join('?');
          window.history.replaceState(null, null,
              l.pathname.slice(0, -1) + decoded + l.hash
          );
        }
      }(window.location))
    </script>

    <!-- Service Worker Registration -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function() {
          navigator.serviceWorker.register('/sw.js')
            .then(function(registration) {
              console.log('Service Worker registrado:', registration.scope);
            })
            .catch(function(error) {
              console.log('Erro no registro do Service Worker:', error);
            });
        });
      }
    </script>
    
    <!-- PWA Install Prompt Handler -->
    <script>
      let deferredPrompt;
      window.addEventListener('beforeinstallprompt', function(e) {
        e.preventDefault();
        deferredPrompt = e;
        window.deferredPrompt = deferredPrompt;
      });
    </script>
    
    <!-- Video Player Fix Script -->
    <script src="/video-player-fix.js"></script>
    
    <!-- Smart TV Navigation Support -->
    <script>
      // Detect Smart TV platforms
      window.isSmartTV = /(Tizen|webOS|SmartTV|Roku|Android.*TV|GoogleTV|AppleTV|CrKey)/i.test(navigator.userAgent);
      window.isAndroidTV = /Android.*TV|GoogleTV|Android.*Leanback/i.test(navigator.userAgent);
      window.isTizen = /Tizen/i.test(navigator.userAgent);
      window.isWebOS = /webOS|Web0S/i.test(navigator.userAgent);
      window.isRoku = /Roku/i.test(navigator.userAgent);
      
      // Enable TV-specific features
      if (window.isSmartTV) {
        document.documentElement.classList.add('smart-tv');
      }
    </script>
