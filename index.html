    <!-- CACHE BUSTING - Força atualização em cada deploy -->
    <script>
      // Força limpeza de cache se versão mudou
      (function() {
        const CURRENT_VERSION = '20260426-2115';
        const cachedVersion = localStorage.getItem('app_version');
        if (cachedVersion !== CURRENT_VERSION) {
          console.log('[CacheBusting] Nova versão detectada:', CURRENT_VERSION);
          localStorage.setItem('app_version', CURRENT_VERSION);
          // Limpa caches específicos
          if ('caches' in window) {
            caches.keys().then(names => {
              names.forEach(name => {
                if (name.includes('cinecasa')) {
                  console.log('[CacheBusting] Limpando cache:', name);
                  caches.delete(name);
                }
              });
            });
          }
        }
      })();
    </script>
    
    <!-- WHITE SCREEN RECOVERY - Detecta e corrige tela branca no Android -->
    <script>
      (function() {
        // Detectar se está rodando como PWA standalone
        const isStandalone = window.matchMedia('(display-mode: standalone)').matches || 
                            window.navigator.standalone === true;
        
        // Configurações - mais tolerantes para PWA
        const CHECK_INTERVAL = 3000; // Verificar a cada 3 segundos
        const MAX_WAIT_TIME = isStandalone ? 15000 : 10000;  // 15s para PWA, 10s para browser
        const RECOVERY_KEY = '__cinecasa_recovery_attempts__';
        const MAX_RECOVERY_ATTEMPTS = isStandalone ? 2 : 3; // Menos tentativas no PWA
        
        let checkTimer = null;
        let startTime = Date.now();
        let recoveryAttempted = false;
        
        // Verificar tentativas anteriores
        const attempts = parseInt(localStorage.getItem(RECOVERY_KEY) || '0');
        
        console.log('[WhiteScreenRecovery] Modo:', isStandalone ? 'PWA Standalone' : 'Browser', 
                    'Max tempo:', MAX_WAIT_TIME, 'ms');
        
        // Função para verificar se a app carregou
        function checkAppLoaded() {
          const root = document.getElementById('root');
          const elapsed = Date.now() - startTime;
          
          // Verificar se o root tem conteúdo
          const hasContent = root && (
            root.children.length > 0 || 
            root.innerHTML.length > 100 ||
            root.textContent.trim().length > 0
          );
          
          // Se carregou, limpar timer e resetar tentativas
          if (hasContent) {
            clearInterval(checkTimer);
            localStorage.removeItem(RECOVERY_KEY);
            console.log('[WhiteScreenRecovery] App carregou com sucesso em', elapsed, 'ms');
            return;
          }
          
          // Se passou do tempo máximo e ainda não tentou recovery
          if (elapsed > MAX_WAIT_TIME && !recoveryAttempted) {
            recoveryAttempted = true;
            
            if (attempts < MAX_RECOVERY_ATTEMPTS) {
              console.log('[WhiteScreenRecovery] Tela branca detectada! Tentando recovery...');
              
              // Incrementar tentativas
              localStorage.setItem(RECOVERY_KEY, (attempts + 1).toString());
              
              // NO PWA: NÃO limpar caches, apenas tentar recarregar
              if (!isStandalone) {
                // Apenas no browser: tentar limpar cache do Service Worker
                if ('serviceWorker' in navigator) {
                  navigator.serviceWorker.getRegistrations().then(function(registrations) {
                    registrations.forEach(function(registration) {
                      registration.unregister();
                      console.log('[WhiteScreenRecovery] Service Worker desregistrado');
                    });
                  });
                }
                
                if ('caches' in window) {
                  caches.keys().then(function(cacheNames) {
                    cacheNames.forEach(function(cacheName) {
                      caches.delete(cacheName);
                    });
                  });
                }
              }
              
              // Recarregar após breve delay
              setTimeout(function() {
                window.location.reload();
              }, 1000);
              
            } else {
              console.error('[WhiteScreenRecovery] Máximo de tentativas atingido.');
              // No PWA, tentar uma última vez sem mostrar erro
              if (isStandalone) {
                localStorage.removeItem(RECOVERY_KEY);
                setTimeout(() => window.location.reload(), 2000);
              } else {
                showErrorPage();
              }
            }
          }
        }
        
        // Página de erro quando recovery falha
        function showErrorPage() {
          document.body.innerHTML = `
            <div style="
              background: #000;
              color: #fff;
              font-family: system-ui, -apple-system, sans-serif;
              padding: 40px 20px;
              text-align: center;
              min-height: 100vh;
              display: flex;
              flex-direction: column;
              justify-content: center;
              align-items: center;
            ">
              <h1 style="color: #E50914; margin-bottom: 20px;">⚠️ Erro ao Carregar</h1>
              <p style="margin-bottom: 30px; line-height: 1.6; max-width: 400px;">
                O CineCasa não conseguiu carregar após várias tentativas.
              </p>
              <div style="display: flex; gap: 15px; flex-wrap: wrap; justify-content: center;">
                <button onclick="window.location.reload(true)" style="
                  background: #E50914;
                  color: white;
                  border: none;
                  padding: 15px 30px;
                  border-radius: 8px;
                  font-size: 16px;
                  cursor: pointer;
                  font-weight: bold;
                ">🔄 Tentar Novamente</button>
                <button onclick="localStorage.clear(); sessionStorage.clear(); window.location.reload(true)" style="
                  background: transparent;
                  color: white;
                  border: 2px solid #E50914;
                  padding: 15px 30px;
                  border-radius: 8px;
                  font-size: 16px;
              cursor: pointer;
                ">🧹 Limpar Tudo</button>
              </div>
              <p style="margin-top: 40px; font-size: 14px; color: #666;">
                Se o problema persistir, entre em contato com o suporte.
              </p>
            </div>
          `;
        }
        
        // Iniciar verificação quando DOM estiver pronto
        if (document.readyState === 'loading') {
          document.addEventListener('DOMContentLoaded', function() {
            checkTimer = setInterval(checkAppLoaded, CHECK_INTERVAL);
          });
        } else {
          checkTimer = setInterval(checkAppLoaded, CHECK_INTERVAL);
        }
        
        // Capturar erros globais
        window.addEventListener('error', function(e) {
          console.error('[WhiteScreenRecovery] Erro capturado:', e.message, 'em', e.filename, ':', e.lineno);
        });
        
        window.addEventListener('unhandledrejection', function(e) {
          console.error('[WhiteScreenRecovery] Promise rejeitada:', e.reason);
        });
      })();
    </script>
    
    <script type="text/javascript">
      // Restaurar rota do SPA após redirecionamento do 404.html
      (function(l) {
        if (l.search[1] === '/' ) {
          var decoded = l.search.slice(1).split('&').map(function(s) { 
            return s.replace(/~and~/g, '&') 
          }).join('?');
          window.history.replaceState(null, null,
              l.pathname.slice(0, -1) + decoded + l.hash
          );
        }
      }(window.location))
    </script>

    <!-- PWA Install Prompt Handler with Smart Detection -->
    <script>
      let deferredPrompt;
      let installPromptShown = false;
      
      // Smart install prompt detection
      window.addEventListener('beforeinstallprompt', function(e) {
        e.preventDefault();
        deferredPrompt = e;
        window.deferredPrompt = deferredPrompt;
        
        // Show prompt after user engagement
        if (!installPromptShown) {
          setTimeout(function() {
            if (!installPromptShown && localStorage.getItem('pwa-install-dismissed') === null) {
              // Fire custom event for React components
              window.dispatchEvent(new CustomEvent('pwa-install-available', {
                detail: { prompt: deferredPrompt }
              }));
            }
          }, 3000); // Show after 3 seconds
        }
      });
      
      // Track installation
      window.addEventListener('appinstalled', function(e) {
        console.log('PWA instalada com sucesso');
        installPromptShown = true;
        
        // Analytics event
        if ('gtag' in window) {
          gtag('event', 'pwa_installed', {
            event_category: 'PWA',
            event_label: 'success'
          });
        }
        
        // Fire custom event
        window.dispatchEvent(new CustomEvent('pwa-installed', {
          detail: { timestamp: Date.now() }
        }));
      });
      
      // Handle install prompt dismissal
      window.addEventListener('pwa-install-dismissed', function(e) {
        installPromptShown = true;
        localStorage.setItem('pwa-install-dismissed', Date.now().toString());
      });
      
      // Expose install function globally
      window.installPWA = function() {
        if (deferredPrompt && !installPromptShown) {
          deferredPrompt.prompt();
          deferredPrompt.userChoice.then(function(choiceResult) {
            if (choiceResult.outcome === 'accepted') {
              console.log('Usuário aceitou instalação');
            } else {
              console.log('Usuário recusou instalação');
            }
            deferredPrompt = null;
          });
        }
      };
    </script>

      window.isFireTV = /FireTV/i.test(navigator.userAgent);
      
      // Device capabilities
      window.deviceCapabilities = {
        hasTouch: 'ontouchstart' in window,
        hasPointer: 'onpointerdown' in window,
        hasKeyboard: 'onkeydown' in window,
        hasGamepad: 'getGamepads' in navigator,
        hasVibration: 'vibrate' in navigator,
        hasFullscreen: 'fullscreenEnabled' in document,
        hasOrientation: 'orientation' in screen,
        hasWakeLock: 'wakeLock' in navigator,
        hasBluetooth: 'bluetooth' in navigator,
        hasGeolocation: 'geolocation' in navigator,
        hasCamera: 'mediaDevices' in navigator,
        hasMicrophone: 'mediaDevices' in navigator
      };
      
      // Enable TV-specific features
      if (window.isSmartTV) {
        document.documentElement.classList.add('smart-tv');
        
        // Add TV-specific meta tags
        const metaViewport = document.querySelector('meta[name="viewport"]');
        if (metaViewport) {
          metaViewport.setAttribute('content', 'width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover');
        }
      }
      
      // Handle remote control navigation
      if (window.isSmartTV) {
        document.addEventListener('keydown', function(e) {
          switch(e.key) {
            case 'ArrowUp':
            case 'ArrowDown':
            case 'ArrowLeft':
            case 'ArrowRight':
            case 'Enter':
            case 'Back':
            case 'Escape':
              // Allow default TV navigation
              break;
            default:
              // Prevent other keys from scrolling
              if (e.key.length === 1) {
                e.preventDefault();
              }
          }
        });
      }
      
      // Performance monitoring
      if ('performance' in window) {
        window.addEventListener('load', function() {
          setTimeout(function() {
            const perfData = performance.getEntriesByType('navigation')[0];
            if (perfData) {
              console.log('Performance metrics:', {
                loadTime: perfData.loadEventEnd - perfData.loadEventStart,
                domContentLoaded: perfData.domContentLoadedEventEnd - perfData.loadEventStart,
                firstPaint: performance.getEntriesByType('paint')[0]?.startTime,
                firstContentfulPaint: performance.getEntriesByType('paint')[1]?.startTime
              });
            }
          }, 0);
        });
      }
    </script>
    
    <!-- PWA Theme and Display Mode Detection -->
    <script>
      // Detect display mode
      window.displayMode = 'browser';
      if (window.matchMedia('(display-mode: standalone)').matches) {
        window.displayMode = 'standalone';
      } else if (window.matchMedia('(display-mode: minimal-ui)').matches) {
        window.displayMode = 'minimal-ui';
      } else if (window.navigator.standalone === true) {
        window.displayMode = 'standalone';
      }
      
      // Detect theme preference
      window.preferredTheme = 'light';
      if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
        window.preferredTheme = 'dark';
      }
      
      // Detect reduced motion
      window.prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
      
      // Apply theme classes
      document.documentElement.classList.add(`theme-${window.preferredTheme}`);
      if (window.prefersReducedMotion) {
        document.documentElement.classList.add('reduce-motion');
      }
      
      // Handle theme changes
      window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', function(e) {
        document.documentElement.classList.remove('theme-light', 'theme-dark');
        document.documentElement.classList.add(`theme-${e.matches ? 'dark' : 'light'}`);
        window.preferredTheme = e.matches ? 'dark' : 'light';
      });
    </script>
    
    <!-- Google Cast SDK para Screen Casting (gratuito) -->
    <script src="https://www.gstatic.com/cv/js/sender/v1/cast_sender.js?loadCastFramework=1" async></script>
  </head>
